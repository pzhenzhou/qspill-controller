---
apiVersion: v1
kind: Namespace
metadata:
  name: qspill-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qspill-controller-manager
  namespace: qspill-system
  labels:
    app: qspill-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qspill-controller
  template:
    metadata:
      labels:
        app: qspill-controller
    spec:
      serviceAccountName: qspill-controller-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: ghcr.io/pzhenzhou/qspill-controller:latest
        imagePullPolicy: IfNotPresent
        args:
        - --leader-elect
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      terminationGracePeriodSeconds: 10
