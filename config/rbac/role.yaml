# Namespace-scoped permissions for client-go leader election (lease lock) and
# for watching the controller's own ConfigMap for hot-reload.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: qspill-controller
  labels:
    app.kubernetes.io/name: qspill-controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
