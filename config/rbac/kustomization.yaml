apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Cluster-scoped permissions required by the controller. Bound to the
# `qspill-controller` ServiceAccount in the deployment namespace; install
# alongside (or before) any environment overlay that uses that namespace.
resources:
  - service_account.yaml
  - cluster_role.yaml
  - cluster_role_binding.yaml
  - role.yaml
  - role_binding.yaml

namespace: qspill-controller-system

labels:
  - pairs:
      app.kubernetes.io/name: qspill-controller
      app.kubernetes.io/managed-by: kustomize
