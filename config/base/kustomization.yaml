apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for qspill-controller. RBAC is intentionally kept in
# config/rbac so it can be applied independently and shared across overlays.
resources:
  - namespace.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml

namePrefix: ""

namespace: qspill-controller-system

labels:
  - pairs:
      app.kubernetes.io/name: qspill-controller
      app.kubernetes.io/component: controller
      app.kubernetes.io/managed-by: kustomize
