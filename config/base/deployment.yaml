# qspill-controller — Deployment.
#
# Single replica behind client-go leader election (DESIGN.md §10.4). Increase
# replicas for HA; the lease in coordination.k8s.io guarantees only one writer
# performs reconciliation at any time. RollingUpdate is safe because the new
# pod simply waits for the lease to be released before becoming the writer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qspill-controller
  labels:
    app.kubernetes.io/name: qspill-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: qspill-controller
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qspill-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: qspill-controller
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: qspill-controller
                topologyKey: kubernetes.io/hostname
      containers:
        - name: controller
          image: qspill-controller
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/qspill-controller/config.yaml
            - --probe-addr=:8081
            - --namespace=$(POD_NAMESPACE)
            - --config-name=qspill-controller-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: QSPILL_CONTROLLER_ENV
              value: prod
          ports:
            - name: probe
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: probe
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/qspill-controller
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: qspill-controller-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}
