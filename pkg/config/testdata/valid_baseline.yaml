  reconcileResyncPeriod: 30s
  thresholds:
    timeOn: 30s
    timeOff: 10m
    timePendingMax: 5m
    hysteresis: 0.2
policies:
  - name: biz-a
    queueName: biz-a
    dedicatedNodeGroup: ng2
    overflowNodeGroup: ng1
    minNodes: 1
    maxNodes: 5
